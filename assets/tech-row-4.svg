    <rect x="865" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="871" y="1" width="26" height="40" fill="#555"/>
    <text x="881" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">VS</text>
    <text x="923" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">VS Code</text>

    <rect x="980" y="1" width="145" height="40" rx="6" fill="#000000"/>
    <rect x="980" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="986" y="1" width="26" height="40" fill="#555"/>
