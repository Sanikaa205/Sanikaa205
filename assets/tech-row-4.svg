    <text x="525" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#000">PyCharm</text>

    <!-- Duplicate Set -->

    <rect x="670" y="1" width="75" height="40" rx="6" fill="#F05032"/>
    <rect x="670" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="676" y="1" width="26" height="40" fill="#555"/>
    <text x="686" y="21" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Gt</text>
    <text x="722" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">Git</text>

    <rect x="755" y="1" width="100" height="40" rx="6" fill="#181717"/>
