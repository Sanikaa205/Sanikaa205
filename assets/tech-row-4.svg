    <rect x="1141" y="1" width="26" height="40" fill="#555"/>
    <text x="1151" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">PC</text>
    <text x="1195" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#000">PyCharm</text>

  </g>
</svg>
