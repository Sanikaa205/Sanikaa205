<svg xmlns="http://www.w3.org/2000/svg" width="576" height="42" viewBox="0 0 576 42" overflow="hidden">
  <style>
    .scroll { animation: s 15s linear infinite; }
    @keyframes s {
      0% { transform: translateX(0); }
      100% { transform: translateX(-606px); }
    }
    text {
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      dominant-baseline: central;
    }
