
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="42" viewBox="0 0 640 42" overflow="hidden">
  <style>
    .scroll { animation: s 18s linear infinite; }
    @keyframes s {
      0% { transform: translateX(0); }
      100% { transform: translateX(-670px); }
    }
    text {
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      dominant-baseline: central;
    }
  </style>

  <g class="scroll">

    <!-- Postman -->
    <rect x="0" y="1" width="105" height="40" rx="6" fill="#FF6C37"/>
    <rect x="0" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="6" y="1" width="26" height="40" fill="#555"/>
    <text x="16" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">PM</text>
    <text x="69" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">Postman</text>

    <!-- Docker -->
