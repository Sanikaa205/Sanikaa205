    <rect x="115" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="121" y="1" width="26" height="40" fill="#555"/>
    <text x="131" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">DK</text>
    <text x="173" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">Docker</text>

