<svg xmlns="http://www.w3.org/2000/svg" width="492" height="42" viewBox="0 0 492 42" overflow="hidden">
  <style>
    .scroll { animation: s 16s linear infinite; }
    @keyframes s {
      0% { transform: translateX(-522px); }
      100% { transform: translateX(0); }
    }
    text {
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      dominant-baseline: central;
    }
  </style>

  <g class="scroll">

    <!-- MongoDB -->
    <rect x="0" y="1" width="108" height="40" rx="6" fill="#47A248"/>
    <rect x="0" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="6" y="1" width="26" height="40" fill="#555"/>
    <text x="16" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Mg</text>
    <text x="68" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">MongoDB</text>

    <!-- MySQL -->
    <rect x="118" y="1" width="92" height="40" rx="6" fill="#00758F"/>
    <rect x="118" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="124" y="1" width="26" height="40" fill="#555"/>
    <text x="134" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">My</text>
    <text x="174" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">MySQL</text>

    <!-- PostgreSQL -->
    <rect x="220" y="1" width="118" height="40" rx="6" fill="#4169E1"/>
    <rect x="220" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="226" y="1" width="26" height="40" fill="#555"/>
    <text x="236" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Pg</text>
    <text x="295" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">PostgreSQL</text>

    <!-- Firestore -->
    <rect x="348" y="1" width="114" height="40" rx="6" fill="#FFCA28"/>
    <rect x="348" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="354" y="1" width="26" height="40" fill="#555"/>
    <text x="364" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Fs</text>
    <text x="418" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#000">Firestore</text>

    <!-- Duplicate Set (+522) -->

    <!-- MongoDB -->
    <rect x="522" y="1" width="108" height="40" rx="6" fill="#47A248"/>
    <rect x="522" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="528" y="1" width="26" height="40" fill="#555"/>
    <text x="538" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Mg</text>
    <text x="590" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">MongoDB</text>

    <!-- MySQL -->
    <rect x="640" y="1" width="92" height="40" rx="6" fill="#00758F"/>
    <rect x="640" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="646" y="1" width="26" height="40" fill="#555"/>
    <text x="656" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">My</text>
    <text x="696" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">MySQL</text>

    <!-- PostgreSQL -->
    <rect x="742" y="1" width="118" height="40" rx="6" fill="#4169E1"/>
    <rect x="742" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="748" y="1" width="26" height="40" fill="#555"/>
    <text x="758" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Pg</text>
    <text x="817" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">PostgreSQL</text>

    <!-- Firestore -->
    <rect x="870" y="1" width="114" height="40" rx="6" fill="#FFCA28"/>
    <rect x="870" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="876" y="1" width="26" height="40" fill="#555"/>
    <text x="886" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Fs</text>
    <text x="940" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#000">Firestore</text>

  </g>
