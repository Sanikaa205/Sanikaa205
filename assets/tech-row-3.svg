<svg xmlns="http://www.w3.org/2000/svg" width="620" height="42" viewBox="0 0 620 42" overflow="hidden">
  <style>
    .scroll { animation: s 18s linear infinite; }
    @keyframes s {
      0% { transform: translateX(0); }
      100% { transform: translateX(-650px); }
    }
    text {
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      dominant-baseline: central;
    }
  </style>

  <g class="scroll">

    <!-- Node.js -->
    <rect x="0" y="1" width="105" height="40" rx="6" fill="#339933"/>
    <rect x="0" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="6" y="1" width="26" height="40" fill="#555"/>
    <text x="16" y="21" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Nd</text>
    <text x="70" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">Node.js</text>

    <!-- Express.js -->
    <rect x="115" y="1" width="118" height="40" rx="6" fill="#000000"/>
    <rect x="115" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="121" y="1" width="26" height="40" fill="#555"/>
    <text x="131" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Ex</text>
    <text x="183" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">Express.js</text>

    <!-- Flask -->
    <rect x="243" y="1" width="88" height="40" rx="6" fill="#2C3E50"/>
    <rect x="243" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="249" y="1" width="26" height="40" fill="#555"/>
    <text x="259" y="21" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Fl</text>
    <text x="298" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">Flask</text>

    <!-- FastAPI -->
    <rect x="341" y="1" width="102" height="40" rx="6" fill="#009688"/>
    <rect x="341" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="347" y="1" width="26" height="40" fill="#555"/>
    <text x="357" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">FA</text>
    <text x="401" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">FastAPI</text>

    <!-- Firebase -->
    <rect x="453" y="1" width="105" height="40" rx="6" fill="#FFCA28"/>
    <rect x="453" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="459" y="1" width="26" height="40" fill="#555"/>
    <text x="469" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">FB</text>
    <text x="520" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#000">Firebase</text>

    <!-- Duplicate Set -->

    <rect x="650" y="1" width="105" height="40" rx="6" fill="#339933"/>
    <rect x="650" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="656" y="1" width="26" height="40" fill="#555"/>
    <text x="666" y="21" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Nd</text>
    <text x="720" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">Node.js</text>

    <rect x="765" y="1" width="118" height="40" rx="6" fill="#000000"/>
    <rect x="765" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="771" y="1" width="26" height="40" fill="#555"/>
    <text x="781" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Ex</text>
    <text x="833" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">Express.js</text>

    <rect x="893" y="1" width="88" height="40" rx="6" fill="#2C3E50"/>
    <rect x="893" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="899" y="1" width="26" height="40" fill="#555"/>
    <text x="909" y="21" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Fl</text>
    <text x="948" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">Flask</text>

    <rect x="991" y="1" width="102" height="40" rx="6" fill="#009688"/>
    <rect x="991" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="997" y="1" width="26" height="40" fill="#555"/>
    <text x="1007" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">FA</text>
    <text x="1051" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#fff">FastAPI</text>

    <rect x="1103" y="1" width="105" height="40" rx="6" fill="#FFCA28"/>
    <rect x="1103" y="1" width="32" height="40" rx="6" fill="#555"/>
    <rect x="1109" y="1" width="26" height="40" fill="#555"/>
    <text x="1119" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">FB</text>
    <text x="1170" y="21" text-anchor="middle" font-size="13" font-weight="500" fill="#000">Firebase</text>

  </g>
</svg>
