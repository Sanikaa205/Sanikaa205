name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Sanikaa205
          outputs: |
             outputs: |
                outputs: |
                  dist/github-contribution-grid-snake.svg?color_snake=%23C4B5FD&color_dots=%232B3440,%23414D63,%236D5EF8,%238B5CF6,%23C4B5FD
                  dist/github-contribution-grid-snake-dark.svg?color_snake=%23C4B5FD&color_dots=%232B3440,%23414D63,%236D5EF8,%238B5CF6,%23C4B5FD

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
