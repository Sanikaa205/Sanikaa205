name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Sanikaa205
          outputs: |
             outputs: |
                dist/github-contribution-grid-snake.svg?color_snake=%23A78BFA&color_dots=%23161B22,%23222C36,%23312E81,%235B21B6,%237C3AED
                dist/github-contribution-grid-snake-dark.svg?color_snake=%23A78BFA&color_dots=%23161B22,%23222C36,%23312E81,%235B21B6,%237C3AED

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
